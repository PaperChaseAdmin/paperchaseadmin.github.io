<style>
.ml { display: flex; flex-direction: column; gap: 1px; background: var(--pc-border); border-radius: var(--pc-radius-lg); overflow: hidden; }
.mc { background: var(--pc-surface); padding: 14px 16px; transition: background .1s; }
.mc:hover { background: var(--pc-surface-hover); }
.mc-q { font-size: 13px; font-weight: 600; color: var(--pc-heading); line-height: 1.4; margin-bottom: 6px; }
.mc-q a { color: var(--pc-heading); text-decoration: none; }
.mc-q a:hover { color: var(--pc-brand); }
.mc-m { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--pc-text-2); margin-bottom: 6px; }
.mc-m strong { color: var(--pc-heading); font-family: var(--pc-mono); font-weight: 600; }
.mc-b { height: 4px; background: var(--pc-surface-3); border-radius: 2px; overflow: hidden; }
.mc-bf { height: 100%; border-radius: 2px; transition: width .5s; }
.sb { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.si { padding: 10px 14px; background: var(--pc-surface); border: 1px solid var(--pc-border); border-radius: var(--pc-radius-lg); flex: 1; min-width: 100px; text-align: center; }
.si .sl { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--pc-text-3); }
.si .sv { font-size: 20px; font-weight: 700; font-family: var(--pc-mono); color: var(--pc-heading); margin-top: 2px; }
@media (max-width: 768px) { .si { min-width: 80px; } }
</style>
</head>
<body>

<nav class="topbar"><div class="topbar-inner">
  <a class="logo" href="/">PaperChase<span>.</span></a>
  <div class="topbar-nav">
    <a class="nav-link" href="/market-sentinel/" data-i18n="nav_sentinel">Market Sentinel</a>
    <a class="nav-link" href="/crypto-pulse/" data-i18n="nav_cryptopulse">Crypto Pulse</a>
    <a class="nav-link" href="/poly-watch/" data-i18n="nav_polymarket">Poly Watch</a>
    <a class="nav-link" href="/stock-pick/">Stock Pick</a>
    <a class="nav-link" href="/trading-arena/" data-i18n="nav_trading">Trading Arena</a>
  </div>
</div></nav>

<div class="container">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div>
      <h1 style="font-size:22px;font-weight:700;color:var(--pc-heading);letter-spacing:-0.03em;margin:0">Poly Watch</h1>
      <p style="font-size:12px;color:var(--pc-text-2);margin-top:1px">Top 10 Polymarket prediction markets by 24h volume</p>
    </div>
    <div id="countdown-wrap" class="countdown-wrap"></div>
  </div>

  <div class="loading" id="main-loading"><div class="spinner"></div>Loading markets…</div>

  <div id="main-content" style="display:none">
    <div class="sb" id="statsBar"></div>
    <div class="ml" id="marketList"></div>
  </div>
</div>

<script>
var DATA_URL = 'https://raw.githubusercontent.com/PaperChaseAdmin/paperchaseadmin.github.io/main/data/market_data.json';
var _cdTimer = null;
function onDataLoaded(t) { clearInterval(_cdTimer); var el=document.getElementById('countdown-wrap'); if(!el||typeof window.startCountdown!=='function')return; _cdTimer=window.startCountdown(el,'Next Update','poly-watch',loadData); }
var $=function(id){return document.getElementById(id);};
var fmt = function(v){return v==null?'—':v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(1)+'K':'$'+v.toFixed(0);};

function loadData(){
  fetch(DATA_URL+'?t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){
      var markets = (d.stocks||{}).polymarket || [];
      $('main-loading').style.display='none';
      $('main-content').style.display='block';
      var total=markets.length, avgYes=total?Math.round(markets.reduce(function(s,m){return s+m.yes_price;},0)/total*100):0, vol=markets.reduce(function(s,m){return s+(m.volume_24h||0);},0);
      $('statsBar').innerHTML='<div class="si"><div class="sl">Markets</div><div class="sv">'+total+'</div></div><div class="si"><div class="sl">Avg Yes%</div><div class="sv">'+avgYes+'%</div></div><div class="si"><div class="sl">Total Volume</div><div class="sv">'+fmt(vol)+'</div></div>';
      var html='';
      markets.forEach(function(m){
        var yp=Math.round((m.yes_price||0)*100),bar=yp>=80?'var(--pc-green)':yp>=60?'var(--pc-yellow)':'var(--pc-red)';
        html+='<div class="mc"><div class="mc-q"><a href="'+(m.url||'#')+'" target="_blank" rel="noopener">'+(m.title||'')+'</a></div><div class="mc-m"><span>Yes: <strong style="color:'+bar+'">'+yp+'%</strong></span><span>Vol: <strong>'+fmt(m.volume_24h)+'</strong></span></div><div class="mc-b"><div class="mc-bf" style="width:'+yp+'%;background:'+bar+'"></div></div></div>';
      });
      $('marketList').innerHTML=html||'<div style="text-align:center;padding:40px;color:var(--pc-text-3)">No markets</div>';
      onDataLoaded(d.updated_at);
    })
    .catch(function(e){$('main-loading').innerHTML='⚠️ '+e.message;});
}
document.addEventListener('DOMContentLoaded',loadData);
</script>
</body>
</html>
