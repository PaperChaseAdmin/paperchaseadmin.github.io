<script>
  const BOT_ID='xi',BOT_COLOR='#b91c1c',BOT_NAME='Xi';
  const BOT_AVATAR='🐉',BOT_BIO='The great rejuvenation of Chinese equities. ADRs only.',BOT_STRATEGY='Chinese ADR stocks listed on US exchanges';
  const BOT_RISK='HIGH',BOT_RISK_BAR=8;
  const BOT_MODEL='openrouter/nemotron',BOT_FALLBACK='openrouter/qwen';

<style>
.bot-hero{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.bot-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.bot-meta h1{font-size:20px;font-weight:700;color:var(--pc-heading);margin:0;line-height:1.2}
.bot-meta .sub{font-size:11px;color:var(--pc-text-2);margin-top:1px}
.hero-row{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px;background:var(--pc-surface);border:1px solid var(--pc-border);border-radius:var(--pc-radius-lg);padding:16px}
.hero-icon{font-size:36px;line-height:1;margin-top:2px}
.hero-meta{flex:1}
.hero-name{font-size:22px;font-weight:800;color:var(--pc-heading)}
.hero-bio{font-size:12px;color:var(--pc-text-2);margin-top:1px}
.hero-strategy{font-size:11px;color:var(--pc-text-3);margin-top:2px}
.outlook-card{background:var(--pc-surface);border:1px solid var(--pc-border);border-radius:var(--pc-radius-lg);padding:16px;margin-bottom:16px}
.outlook-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--pc-text-3);margin-bottom:6px}
.outlook{font-size:12px;color:var(--pc-text);line-height:1.5}
.metrics-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.metric{background:var(--pc-surface);border:1px solid var(--pc-border);border-radius:var(--pc-radius);padding:10px 12px}
.metric-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--pc-text-3);margin-bottom:1px}
.metric-val{font-size:16px;font-weight:700;font-family:var(--pc-mono);color:var(--pc-heading)}
.metric-val.profit{color:var(--pc-green)}
.metric-val.loss{color:var(--pc-red)}
.specs{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.specs .si{background:var(--pc-surface);border:1px solid var(--pc-border);border-radius:var(--pc-radius);padding:10px 12px}
.specs .si .sl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--pc-text-3)}
.specs .si .sv{font-size:14px;font-weight:700;font-family:var(--pc-mono);color:var(--pc-heading);margin-top:1px}
.st{font-size:12px;font-weight:700;color:var(--pc-heading);margin-bottom:10px;margin-top:16px}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase}
.badge-buy{background:var(--pc-green-bg);color:var(--pc-green)}
.badge-sell{background:var(--pc-red-bg);color:var(--pc-red)}
.follow-card{background:var(--pc-surface);border:1px solid var(--pc-border);border-radius:var(--pc-radius-lg);padding:16px;margin-bottom:16px}
.follow-steps{display:flex;flex-direction:column;gap:10px}
.follow-step{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--pc-text);line-height:1.5}
.follow-num{width:22px;height:22px;border-radius:50%;background:var(--pc-brand);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.follow-warning{font-size:11px;color:var(--pc-text-3);margin-top:10px;padding:8px 10px;background:var(--pc-yellow-bg);border-radius:var(--pc-radius)}
.pos-row{background:var(--pc-surface)}
.pos-row td{padding:8px 10px;border-bottom:1px solid var(--pc-border);font-size:12px}
.pos-detail{background:var(--pc-surface-hover);padding:10px 12px;font-size:11px;color:var(--pc-text-2);line-height:1.5}
.pos-detail-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:6px}
.pos-detail-lbl{font-size:9px;color:var(--pc-text-3);text-transform:uppercase;letter-spacing:.05em}
.pos-detail-val{font-size:12px;font-weight:600;color:var(--pc-heading);font-family:var(--pc-mono)}
.mono{font-family:var(--pc-mono)}
.profit{color:var(--pc-green)}
.loss{color:var(--pc-red)}
.price-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-family:var(--pc-mono);padding:3px 8px;border-radius:3px;background:var(--pc-surface);border:1px solid var(--pc-border)}
.price-chip-sym{font-weight:600;color:var(--pc-heading)}
.price-chip-val{color:var(--pc-text-2)}
.price-chip-chg{font-weight:600}
.price-chip-chg.profit{color:var(--pc-green)}
.price-chip-chg.loss{color:var(--pc-red)}
.chip{display:inline-block;font-size:10px;padding:2px 6px;border-radius:2px;background:var(--pc-surface-3);color:var(--pc-text-2)}
.condition-chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.decision-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--pc-surface-3);color:var(--pc-text-3);border:1px solid var(--pc-border)}
.decision-badge.traded{background:var(--pc-green-bg);color:var(--pc-green);border-color:rgba(43,138,94,0.2)}
.ctx-item{font-size:9px;padding:1px 5px;border-radius:2px;font-weight:500;background:var(--pc-surface-3);color:var(--pc-text-3);border:1px solid var(--pc-border)}
.ctx-up{color:var(--pc-green)}
.ctx-down{color:var(--pc-red)}
.empty{padding:20px;text-align:center;color:var(--pc-text-3);font-size:12px}
.ai-reasoning{background:var(--pc-surface-hover);border-left:2px solid var(--pc-brand);border-radius:var(--pc-radius);padding:10px 12px;font-size:12px;line-height:1.6;color:var(--pc-text-2)}
.domain-extra{background:var(--pc-surface-3);border-radius:var(--pc-radius);padding:10px 12px;font-size:12px;line-height:1.5;color:var(--pc-text-2)}
.session-news{list-style:none;padding:0}
.session-news li{position:relative;padding:4px 0 4px 14px;font-size:12px;color:var(--pc-text-2);line-height:1.5}
.session-news li::before{content:'';position:absolute;left:0;top:10px;width:4px;height:4px;border-radius:50%;background:var(--pc-text-3)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--pc-text-3);padding:8px 10px;text-align:left;border-bottom:2px solid var(--pc-border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--pc-border);font-size:12px;color:var(--pc-text)}
.ticker-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.ticker-chip{font-size:11px;font-family:var(--pc-mono);padding:3px 10px;border-radius:3px;background:var(--pc-surface);color:var(--pc-brand);text-decoration:none;border:1px solid var(--pc-border)}
.ticker-chip:hover{background:var(--pc-surface-hover)}
.filter-btn{font-size:10px;font-weight:600;padding:5px 10px;border:1px solid var(--pc-border);border-radius:var(--pc-radius);background:var(--pc-surface);color:var(--pc-text-2);cursor:pointer}
.filter-btn:hover{background:var(--pc-surface-hover);color:var(--pc-heading)}
.filter-btn.on{background:var(--pc-brand);border-color:var(--pc-brand);color:#fff}
.session-ctx{display:flex;flex-wrap:wrap;gap:2px;margin:4px 0}
.signal-ctx{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
</style>
