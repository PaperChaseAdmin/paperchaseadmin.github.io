<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Log In | PaperChase</title>
<meta name="description" content="Log in to your PaperChase account."/>
<link rel="canonical" href="https://paperchase.online/login/"/>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-W3V49QCMT0"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-W3V49QCMT0');</script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="/assets/design-system.css"/>
<script src="/assets/supabase-client.js"></script>
<style>
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--pc-surface);border:1px solid var(--pc-border);border-radius:var(--pc-radius-lg);padding:32px;width:100%;max-width:400px}
.auth-title{font-size:22px;font-weight:700;color:var(--pc-heading);margin-bottom:4px;text-align:center}
.auth-sub{font-size:13px;color:var(--pc-text-2);margin-bottom:24px;text-align:center}
.auth-field{margin-bottom:16px}
.auth-field label{display:block;font-size:11px;font-weight:600;color:var(--pc-text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.auth-field input{width:100%;padding:10px 12px;border-radius:var(--pc-radius);border:1px solid var(--pc-border);background:var(--pc-surface-2);color:var(--pc-heading);font-size:14px;font-family:var(--pc-font);outline:none;transition:border-color .15s}
.auth-field input:focus{border-color:var(--pc-brand)}
.auth-btn{width:100%;padding:10px;border-radius:var(--pc-radius);border:none;background:var(--pc-brand);color:#fff;font-size:14px;font-weight:600;font-family:var(--pc-font);cursor:pointer;transition:background .15s}
.auth-btn:hover{background:var(--pc-brand-hover)}
.auth-links{text-align:center;margin-top:16px;font-size:13px;color:var(--pc-text-2)}
.auth-links a{color:var(--pc-brand);text-decoration:none;font-weight:600}
.auth-links a:hover{text-decoration:underline}
.auth-err{background:var(--pc-red-bg);border:1px solid rgba(197,75,75,.25);color:var(--pc-red);padding:10px 14px;border-radius:var(--pc-radius);margin-bottom:16px;font-size:13px;display:none}
.auth-ok{background:var(--pc-green-bg);border:1px solid rgba(43,138,94,.25);color:var(--pc-green);padding:10px 14px;border-radius:var(--pc-radius);margin-bottom:16px;font-size:13px;display:none}
@media(max-width:600px){.auth-card{padding:24px 20px}}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Welcome Back</div>
    <div class="auth-sub">Sign in to your PaperChase account</div>
    <div class="auth-err" id="err"></div>
    <div class="auth-ok" id="ok"></div>
    <form id="f" onsubmit="return false;">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="pw" placeholder="••••••••" required/>
      </div>
      <button class="auth-btn" onclick="handleLogin()">Sign In</button>
    </form>
    <div class="auth-links">
      Don't have an account? <a href="/register/">Register</a>
    </div>
  </div>
</div>
<script>
async function handleLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  const ok=document.getElementById('ok');
  err.style.display='none'; ok.style.display='none';
  if(!email||!pw){ err.textContent='Please fill in all fields.'; err.style.display='block'; return; }
  const r=await window.PaperChaseAuth.signIn(email,pw);
  if(r.error){
    if(r.error.message&&r.error.message.includes('Email not confirmed')){
      err.textContent='Please check your email for the confirmation link before signing in.';
    }else{
      err.textContent=r.error.message||'Login failed.';
    }
    err.style.display='block'; return;
  }
  const params=new URLSearchParams(window.location.search);
  window.location.href=params.get('redirect')||'/account/';
}
document.getElementById('email').focus();
</script>
</body>
</html>
