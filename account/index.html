<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Account | PaperChase</title>
<meta name="description" content="Manage your PaperChase account, saved bots, and alert preferences."/>
<link rel="canonical" href="https://paperchase.online/account/"/>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-W3V49QCMT0"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-W3V49QCMT0');</script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"/>
<link rel="stylesheet" href="/assets/design-system.css"/>
<script src="/assets/supabase-client.js"></script>
<style>
.container{max-width:var(--pc-max-width);margin:0 auto;padding:24px}
.st{font-size:13px;font-weight:700;color:var(--pc-heading);margin-bottom:12px;margin-top:20px}
.card{background:var(--pc-surface);border:1px solid var(--pc-border);border-radius:var(--pc-radius-lg);padding:20px;margin-bottom:16px}
.prof-row{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.prof-av{width:48px;height:48px;border-radius:50%;background:var(--pc-brand-soft);color:var(--pc-brand);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
.prof-info h2{font-size:18px;font-weight:700;color:var(--pc-heading);margin:0}
.prof-info p{font-size:12px;color:var(--pc-text-2);margin-top:2px}
.bot-card{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--pc-border)}
.bot-card:last-child{border:none}
.bot-av{font-size:20px;width:32px;text-align:center}
.bot-nm{font-size:14px;font-weight:600;color:var(--pc-heading);flex:1}
.bot-nm a{color:var(--pc-heading);text-decoration:none}
.bot-nm a:hover{color:var(--pc-brand)}
.bot-rmv{font-size:11px;color:var(--pc-red);cursor:pointer;background:none;border:none;font-family:var(--pc-font)}
.empty-st{font-size:13px;color:var(--pc-text-3);padding:20px 0}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--pc-text-2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.field input[type=text],.field input[type=email]{width:100%;padding:8px 10px;border-radius:var(--pc-radius);border:1px solid var(--pc-border);background:var(--pc-surface-2);color:var(--pc-heading);font-size:13px;font-family:var(--pc-font);outline:none}
.field input:focus{border-color:var(--pc-brand)}
.toggle{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.toggle input[type=checkbox]{width:18px;height:18px;accent-color:var(--pc-brand)}
.toggle label{font-size:13px;color:var(--pc-text);cursor:pointer}
.save-btn{padding:8px 20px;border-radius:var(--pc-radius);border:none;background:var(--pc-brand);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--pc-font)}
.save-btn:hover{background:var(--pc-brand-hover)}
.logout-btn{padding:8px 20px;border-radius:var(--pc-radius);border:1px solid var(--pc-border);background:var(--pc-surface);color:var(--pc-text-2);font-size:13px;cursor:pointer;font-family:var(--pc-font)}
.logout-btn:hover{color:var(--pc-red);border-color:var(--pc-red)}
@media(max-width:768px){.container{padding:16px}}
</style>
</head>
<body>
<nav class="topbar"><div class="topbar-inner">
  <a class="logo" href="/">PaperChase<span>.</span></a>
  <div class="topbar-nav">
    <a class="nav-link" href="/market-sentinel/">Market Sentinel</a>
    <a class="nav-link" href="/crypto-pulse/">Crypto Pulse</a>
    <a class="nav-link" href="/poly-watch/">Poly Watch</a>
    <a class="nav-link" href="/stock-pick/">Stock Pick</a>
    <a class="nav-link" href="/trading-arena/">Trading Arena</a>
  </div>
</div></nav>
<div class="container" id="app">
  <div style="text-align:center;padding:60px 0;color:var(--pc-text-2);font-size:14px">Loading...</div>
</div>
<script>
async function load(){
  const session = await PaperChaseAuth.getSession();
  if(!session){ window.location.href='/login/?redirect='+encodeURIComponent('/account/'); return; }
  
  const user=session.user;
  const email=user.email;
  const name=user.user_metadata?.display_name||email.split('@')[0];
  const avatar=name.charAt(0).toUpperCase();
  
  // Get saved bots
  const favs=await PaperChaseAuth.getFavourites();
  
  const app=document.getElementById('app');
  app.innerHTML=
    '<div class="prof-row">'+
      '<div class="prof-av">'+avatar+'</div>'+
      '<div class="prof-info"><h2>'+esc(name)+'</h2><p>'+esc(email)+'</p></div>'+
    '</div>'+
    '<div class="st">&#x2764; Saved Bots</div>'+
    '<div class="card" id="savedBots">'+
      (favs.length?favs.map(function(f){return '<div class="bot-card"><div class="bot-av">'+esc(f.bot_avatar||'🤖')+'</div><div class="bot-nm"><a href="/trading-arena/'+esc(f.bot_id)+'/">'+esc(f.bot_name||f.bot_id)+'</a></div><button class="bot-rmv" onclick="removeFav(\''+esc(f.bot_id)+'\')">Remove</button></div>';}).join(''):'<div class="empty-st">No saved bots yet. Browse the <a href="/trading-arena/" style="color:var(--pc-brand)">Trading Arena</a> to save your favourites.</div>')+
    '</div>'+
    '<div class="st">&#x1F514; Email Alerts</div>'+
    '<div class="card" id="alertPrefs">Loading...</div>'+
    '<button class="logout-btn" onclick="PaperChaseAuth.signOut()" style="margin-top:8px">Sign Out</button>';
  
  // Load alert prefs
  const sb=window.supabaseClient;
  const {data:prefs}=await sb.from('alert_prefs').select('*').eq('user_id',user.id).single();
  const mp=prefs?.market_alerts||false;
  const bp=prefs?.bot_alerts||false;
  const ae=prefs?.alert_email||email;
  
  document.getElementById('alertPrefs').innerHTML=
    '<div class="toggle"><input type="checkbox" id="ma" '+(mp?'checked':'')+'><label for="ma">Market sentiment alerts</label></div>'+
    '<div class="toggle"><input type="checkbox" id="ba" '+(bp?'checked':'')+'><label for="ba">Bot trade alerts</label></div>'+
    '<div class="field"><label>Alert Email</label><input type="email" id="ae" value="'+esc(ae)+'"/></div>'+
    '<button class="save-btn" onclick="saveAlerts(\''+user.id+'\')">Save Preferences</button>';
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function saveAlerts(uid){
  const ma=document.getElementById('ma').checked;
  const ba=document.getElementById('ba').checked;
  const ae=document.getElementById('ae').value.trim();
  const sb=window.supabaseClient;
  const {error}=await sb.from('alert_prefs').upsert({user_id:uid,market_alerts:ma,bot_alerts:ba,alert_email:ae});
  if(!error) alert('Preferences saved!');
  else alert('Error: '+error.message);
}

async function removeFav(botId){
  if(!confirm('Remove this bot from favourites?')) return;
  await PaperChaseAuth.removeFavourite(botId);
  load();
}

load();
</script>
</body>
</html>
