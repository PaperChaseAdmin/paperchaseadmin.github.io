<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title data-i18n-title="page_title_account">My Account | PaperChase</title>
<meta name="description" content="Manage your PaperChase account and view your favourite AI trading bots."/>
<meta name="robots" content="noindex, follow"/>
<link rel="canonical" href="https://paperchase.online/account/"/>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-W3V49QCMT0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-W3V49QCMT0');
</script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"/>
<link rel="stylesheet" href="/assets/design-system.css"/>
<script src="/assets/i18n.js"></script>
<script src="/assets/supabase-client.js"></script>
<style>
/* Override dark theme vars to match white+purple design-system.css */
:root {
  --tv-bg: #ffffff; --tv-surface: #ffffff; --tv-surface-2: #f8fafc; --tv-surface-3: #f1f5f9;
  --tv-border: #e2e8f0; --tv-border-2: #cbd5e1;
  --tv-text: #061b31; --tv-text-2: #64748b; --tv-text-3: #94a3b8;
  --tv-green: #15be53; --tv-red: #ef4444; --tv-yellow: #f59e0b; --tv-blue: #533afd;
  --tv-font: var(--pc-font); --tv-mono: var(--pc-mono);
  --tv-radius: var(--pc-radius); --tv-radius-sm: var(--pc-radius-sm);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--tv-bg);color:var(--tv-text);font-family:var(--tv-font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}.bg-overlay{display:none}

.wrap{position:relative;z-index:1}

.topbar{background:rgba(19,23,34,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--tv-border);position:sticky;top:0;z-index:100}
.topbar-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:4px;height:52px}
.logo{font-size:15px;font-weight:800;color:var(--tv-text);text-decoration:none;display:flex;align-items:center;gap:10px;margin-right:20px}
.topbar-nav{display:flex;align-items:center;gap:0}
.nav-link{font-size:13px;font-weight:500;color:var(--tv-text-2);text-decoration:none;padding:6px 12px;border-radius:var(--tv-radius-sm);transition:all .15s}
.nav-link:hover,.nav-link.active{background:var(--tv-surface-2);color:var(--tv-text)}

.account-container{max-width:800px;margin:40px auto;padding:0 20px}
.account-card{background:var(--tv-surface);border:1px solid var(--tv-border);border-radius:var(--tv-radius);padding:28px;margin-bottom:20px}
.account-title{font-size:22px;font-weight:700;color:var(--tv-text);margin-bottom:4px}
.account-subtitle{font-size:13px;color:var(--tv-text-2);margin-bottom:20px}
.account-section-title{font-size:15px;font-weight:600;color:var(--tv-text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--tv-border)}
.account-field{margin-bottom:8px;display:flex;gap:12px;align-items:center}
.account-field-label{font-size:12px;font-weight:600;color:var(--tv-text-2);text-transform:uppercase;letter-spacing:.05em;min-width:100px}
.account-field-value{font-size:14px;color:var(--tv-text)}
.account-btn{display:inline-block;padding:8px 16px;border-radius:var(--tv-radius-sm);border:none;background:var(--tv-red);color:#fff;font-size:13px;font-weight:600;font-family:var(--tv-font);cursor:pointer;transition:background .15s;text-decoration:none}
.account-btn:hover{background:#d32f2f}
.account-btn-outline{background:none;border:1px solid var(--tv-border-2);color:var(--tv-text-2)}
.account-btn-outline:hover{background:var(--tv-surface-2);color:var(--tv-text)}

.fav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.fav-card{background:var(--tv-surface-2);border:1px solid var(--tv-border);border-radius:var(--tv-radius);padding:14px;display:flex;align-items:center;gap:12px;transition:border-color .15s;text-decoration:none;color:var(--tv-text)}
.fav-card:hover{border-color:var(--tv-blue)}
.fav-card-avatar{font-size:28px;flex-shrink:0}
.fav-card-info{flex:1;min-width:0}
.fav-card-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-card-remove{background:none;border:none;color:var(--tv-text-3);cursor:pointer;font-size:16px;padding:4px;transition:color .15s;flex-shrink:0}
.fav-card-remove:hover{color:var(--tv-red)}

.empty-state{text-align:center;padding:40px 20px;color:var(--tv-text-2)}
.empty-state-icon{font-size:48px;margin-bottom:12px}
.empty-state-text{font-size:14px;margin-bottom:16px}
.empty-state-btn{display:inline-block;padding:8px 20px;border-radius:var(--tv-radius-sm);background:var(--tv-blue);color:#fff;font-size:13px;font-weight:600;text-decoration:none;transition:background .15s}
.empty-state-btn:hover{background:#1e4bd2}

.login-prompt{text-align:center;padding:60px 20px}
.login-prompt-icon{font-size:48px;margin-bottom:12px}
.login-prompt-text{font-size:16px;color:var(--tv-text-2);margin-bottom:20px}

@media(max-width:600px){
  .fav-grid{grid-template-columns:1fr}
  .account-card{padding:16px}
  .account-container{margin:20px auto}
  .topbar-inner{padding:0 10px}
  .nav-link{font-size:11px;padding:4px 6px}
}
</style>
</head>
<body>
<div class="wrap">

<nav class="topbar"><div class="topbar-inner">
  <a class="logo" href="/">PaperChase</a>
  <div class="topbar-nav">
    <a class="nav-link" href="/market-sentinel/" data-i18n="nav_sentinel">Market Sentinel</a>
    <a class="nav-link" href="/crypto-pulse/" data-i18n="nav_cryptopulse">Crypto Pulse</a>
    <a class="nav-link" href="/poly-watch/" data-i18n="nav_polymarket">Poly Watch</a>
    <a class="nav-link" href="/stock-pick/">Stock Pick</a>
    <a class="nav-link" href="/predictions/">Predictions</a>
    <a class="nav-link" href="/trading-arena/" data-i18n="nav_trading">Trading Arena</a>
  </div>
  <div class="topbar-spacer" style="flex:1"></div>
  <div class="topbar-auth" style="display:flex;align-items:center;gap:4px;margin-left:8px">
    <a class="nav-link active" href="/account/" data-i18n="nav_account">Account</a>
    <a class="nav-link" href="#" id="accountLogout" onclick="handleLogout(event)" data-i18n="nav_logout" style="color:var(--pc-text-2)">Log Out</a>
  </div>
</div></nav>

<div class="account-container">
  <!-- Not logged in prompt -->
  <div id="loginPrompt" class="login-prompt" style="display:none">
    <div class="login-prompt-icon">🔒</div>
    <div class="login-prompt-text" data-i18n="login_subtitle">Sign in to your PaperChase account</div>
    <a class="empty-state-btn" href="/login" data-i18n="nav_login">Log In</a>
  </div>

  <!-- Account content -->
  <div id="accountContent" style="display:none">
    <!-- User Info -->
    <div class="account-card">
      <div class="account-title" data-i18n="account_title">My Account</div>
      <div class="account-subtitle" data-i18n="account_settings">Account Settings</div>
      <div class="account-field">
        <span class="account-field-label">Email</span>
        <span class="account-field-value" id="userEmail">—</span>
      </div>
      <div class="account-field">
        <span class="account-field-label" data-i18n="register_name">Display Name</span>
        <span class="account-field-value" id="userDisplayName">—</span>
      </div>
      <div class="account-field">
        <span class="account-field-label">UID</span>
        <span class="account-field-value" id="userId" style="font-family:var(--tv-mono);font-size:12px;color:var(--tv-text-3)">—</span>
      </div>
    </div>

    <!-- Favourites -->
    <div class="account-card">
      <div class="account-section-title" data-i18n="account_favourites">Favourite Bots</div>
      <div id="favContainer">
        <div class="empty-state">
          <div class="empty-state-icon">⭐</div>
          <div class="empty-state-text" data-i18n="account_no_favourites">No favourite bots yet. Browse the leaderboard and add some!</div>
          <a class="empty-state-btn" href="/trading-arena/" data-i18n="nav_trading">Browse Bots</a>
        </div>
      </div>
      <div id="favGrid" class="fav-grid" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ── Handle Logout ──
async function handleLogout(e) {
  e.preventDefault();
  if (window.PaperChaseAuth) {
    await PaperChaseAuth.signOut();
  }
  window.location.href = '/';
}

// ── Load Account Data ──
async function loadAccount() {
  if (!window.PaperChaseAuth) {
    setTimeout(loadAccount, 500);
    return;
  }
  
  var session = await PaperChaseAuth.getSession();
  var loginPrompt = document.getElementById('loginPrompt');
  var accountContent = document.getElementById('accountContent');
  
  if (!session) {
    loginPrompt.style.display = '';
    accountContent.style.display = 'none';
    return;
  }
  
  loginPrompt.style.display = 'none';
  accountContent.style.display = '';
  
  // Show user info
  var user = session.user;
  document.getElementById('userEmail').textContent = user.email || '—';
  document.getElementById('userId').textContent = user.id || '—';
  document.getElementById('userDisplayName').textContent = (user.user_metadata && user.user_metadata.display_name) || '—';
  
  // Load favourites
  var favs = await PaperChaseAuth.getFavourites();
  var favContainer = document.getElementById('favContainer');
  var favGrid = document.getElementById('favGrid');
  
  if (!favs || favs.length === 0) {
    favContainer.style.display = '';
    favGrid.style.display = 'none';
  } else {
    favContainer.style.display = 'none';
    favGrid.style.display = '';
    favGrid.innerHTML = favs.map(function(f) {
      return '<a class="fav-card" href="/trading-arena/' + f.bot_id + '/">' +
        '<span class="fav-card-avatar">' + (f.bot_avatar || '🤖') + '</span>' +
        '<span class="fav-card-info">' +
          '<span class="fav-card-name">' + (f.bot_name || f.bot_id) + '</span>' +
        '</span>' +
        '<button class="fav-card-remove" onclick="event.preventDefault();event.stopPropagation();removeFav(\'' + f.bot_id + '\')" title="Remove">✕</button>' +
      '</a>';
    }).join('');
  }
}

async function removeFav(botId) {
  if (!window.PaperChaseAuth) return;
  await PaperChaseAuth.removeFavourite(botId);
  loadAccount();
}

// Init
document.addEventListener('DOMContentLoaded', loadAccount);
if (document.readyState !== 'loading') {
  loadAccount();
}
</script>
</body>
</html>
