name: Diag OpenRouter
on: workflow_dispatch
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: Run diagnostic
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python3 predictions/diag_openrouter.py
      - name: Commit result
        run: |
          git config user.name "PaperChase Bot"
          git config user.email "bot@paperchase.online"
          git add tmp_diag_result.json
          git commit -m "diag: openrouter test $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "no changes"
          git push
