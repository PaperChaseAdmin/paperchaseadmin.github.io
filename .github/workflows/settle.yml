# Settlement workflow — runs after market close
name: Settlement

on:
  schedule:
    - cron: '30 20 * * 1-5'   # 20:30 UTC = 4:30 PM ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests -q

      - name: Run settlement
        run: python3 predictions/settle.py

      - name: Commit results
        run: |
          git config user.name "PaperChase Bot"
          git config user.email "bot@paperchase.online"
          git add predictions/data/predictions.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "settle: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
