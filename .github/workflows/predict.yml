# Scheduled prediction + settlement workflow
# Runs Mon-Fri: predict + stock pick 1hr before US market open (12:30 UTC = 8:30 AM ET)
# Settle after close (20:30 UTC = 4:30 PM ET)
name: Predictions

on:
  schedule:
    - cron: '30 12 * * 1-5'   # 12:30 UTC — predictions + stock pick (1hr before open)
    - cron: '30 20 * * 1-5'   # 20:30 UTC — settlement after close
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          if [ "$HOUR" -eq 12 ] && [ "$MIN" -ge 30 ]; then
            echo "mode=predict_stockpick" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -eq 20 ]; then
            echo "mode=settle" >> $GITHUB_OUTPUT
          else
            echo "mode=manual" >> $GITHUB_OUTPUT
          fi

      - name: Run predictions (AI-powered)
        if: steps.mode.outputs.mode == 'predict_stockpick' || steps.mode.outputs.mode == 'manual'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          pip install requests -q
          python3 predictions/predict.py

      - name: Run Stock Pick screener (yfinance + AI analysis)
        if: steps.mode.outputs.mode == 'predict_stockpick' || steps.mode.outputs.mode == 'manual'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          pip install yfinance requests -q
          python3 stock-pick/screener.py 2>&1 | tail -5

      - name: Run settlement
        if: steps.mode.outputs.mode == 'settle'
        run: python3 predictions/settle.py

      - name: Commit results
        run: |
          git config user.name "PaperChase Bot"
          git config user.email "bot@paperchase.online"
          git add predictions/data/predictions.json stock-pick/data/picks.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: predictions + stock picks $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
