# Scheduled prediction + settlement workflow
# Runs Mon-Fri: predict before open, settle after close
name: Predictions

on:
  schedule:
    # Stock Pick: Mon-Fri 12:30 PM UTC (8:30 AM ET, 1hr before open)
    - cron: '30 12 * * 1-5'
    - cron: '0 13 * * 1-5'
    # Settle: Mon-Fri 8:30 PM UTC (4:30 PM ET)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          if [ "$HOUR" -eq 12 ] && [ "$MIN" -ge 30 ]; then
            echo "mode=stockpick" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -eq 13 ]; then
            echo "mode=predict" >> $GITHUB_OUTPUT
          elif [ "$HOUR" -eq 20 ]; then
            echo "mode=settle" >> $GITHUB_OUTPUT
          else
            echo "mode=manual" >> $GITHUB_OUTPUT
          fi

      - name: Stock Pick screener
        if: steps.mode.outputs.mode == 'stockpick' || steps.mode.outputs.mode == 'manual'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          pip install yfinance -q
          python3 stock-pick/screener.py 2>&1 | tail -5

      - name: Run predictions
        if: steps.mode.outputs.mode == 'predict' || steps.mode.outputs.mode == 'manual'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 predictions/predict.py
          pip install yfinance -q
          python3 stock-pick/screener.py 2>&1 | tail -5

      - name: Run settlement
        if: steps.mode.outputs.mode == 'settle'
        run: python3 predictions/settle.py

      - name: Commit results
        run: |
          git config user.name "PaperChase Bot"
          git config user.email "bot@paperchase.online"
          git add predictions/data/predictions.json stock-pick/data/picks.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: predictions + stock picks $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
