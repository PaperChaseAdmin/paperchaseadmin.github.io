# Predictions workflow — runs 1hr before US market open
name: Predict + Stock Pick

on:
  schedule:
    - cron: '30 12 * * 1-5'   # 12:30 UTC = 8:30 AM ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run predictions (AI-powered)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          pip install requests -q
          python3 predictions/predict.py

      - name: Run Stock Pick screener (yfinance + AI analysis)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          pip install yfinance requests -q
          python3 stock-pick/screener.py 2>&1 | tail -5

      - name: Commit results
        run: |
          git config user.name "PaperChase Bot"
          git config user.email "bot@paperchase.online"
          git add predictions/data/predictions.json stock-pick/data/picks.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: predictions + stock picks $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
