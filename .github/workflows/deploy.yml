# Deploy PaperChase static site to GitHub Pages
# Serves at paperchase.online/
#
# Data sources (fetched at runtime by browser JS):
#   - Trade data: raw.githubusercontent.com/PaperChaseAdmin/trade/gh-pages/data/
#   - Market data: raw.githubusercontent.com/PaperChaseAdmin/market-sentinel/gh-pages/data/
#
# Bot detail pages: generated by trade repo's Action → pushed to this repo's gh-pages
name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: touch .nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: '.'
          enable_jekyll: false
