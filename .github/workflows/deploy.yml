# Deploy PaperChase static site to GitHub Pages
# Serves at paperchase.online/
#
# Only deploys when frontend files change — data updates are ignored.
name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
    paths-ignore:
      - "data/**"
      - "scrapers/**"
      - "update_data.py"
      - "requirements-ms.txt"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: touch .nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: '.'
          enable_jekyll: false
